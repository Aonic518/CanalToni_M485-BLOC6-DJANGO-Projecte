{% load static %}
<article class="post-card">
    <img src="{% static 'blog/images/'|add:post.image_name %}" alt="{{ post.title }}">
    
    <div class="post-content">
        <h3>
            <a href="{% url 'posts-detail-page' post.slug %}">{{ post.title }}</a>
        </h3>
        
        <p class="date">
            {{ post.date|date:"d/m/Y" }} · {{ post.author.first_name }} {{ post.author.last_name }}
        </p>
        
        <p>{{ post.excerpt }}</p>
        
        <a class="btn" href="{% url 'posts-detail-page' post.slug %}">
            Llegir més
        </a>
    </div>
</article>
