name: Generate Pydoc Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Django and dependencies
        run: |
          # Instalar Django directamente
          pip install Django==4.2.20
          # Verificar instalación
          python -c "import django; print(f'Django version: {django.get_version()}')"

      - name: Create docs folder
        run: mkdir -p docs

      - name: Generate documentation
        run: |
          # Añadir my_site al PYTHONPATH
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/my_site"
          
          # Crear un script temporal para generar la documentación
          cat > generate_docs.py << 'PYTHON_SCRIPT'
          import os
          import sys
          import pydoc
          
          # Configurar Django antes de generar documentación
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'my_site.settings')
          
          # Añadir my_site al path
          sys.path.insert(0, os.path.join(os.getcwd(), 'my_site'))
          
          try:
              import django
              django.setup()
              print('✅ Django configurado correctamente')
          except Exception as e:
              print(f'⚠️  Django setup warning: {e}')
          
          # Cambiar al directorio docs
          os.chdir('docs')
          
          # Lista de módulos a documentar
          modules = [
              'blog.views',
              'blog.models',
              'blog.urls',
              'blog.admin',
              'blog.apps',
              'my_site.urls',
              'my_site.settings'
          ]
          
          # Generar documentación
          for module in modules:
              try:
                  print(f'📄 Generando documentación para {module}...')
                  pydoc.writedoc(module)
                  print(f'   ✅ {module} completado')
              except Exception as e:
                  print(f'   ❌ Error con {module}: {e}')
          
          print('✅ Documentación generada correctamente')
          PYTHON_SCRIPT
          
          # Ejecutar el script
          python generate_docs.py
          
          # Volver al directorio raíz
          cd ..

      - name: List generated files
        run: |
          echo "Archivos generados en docs/:"
          ls -la docs/

      - name: Create index.html
        run: |
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ca">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Documentació del Blog Django</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }
                  
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                      line-height: 1.6;
                      color: #333;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      padding: 40px 20px;
                  }
                  
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                      background: white;
                      border-radius: 20px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      overflow: hidden;
                  }
                  
                  .header {
                      background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
                      color: white;
                      padding: 40px;
                      text-align: center;
                  }
                  
                  .header h1 {
                      font-size: 2.5rem;
                      margin-bottom: 10px;
                  }
                  
                  .header p {
                      font-size: 1.1rem;
                      opacity: 0.9;
                  }
                  
                  .content {
                      padding: 40px;
                  }
                  
                  .modules {
                      display: grid;
                      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                      gap: 20px;
                      margin-top: 20px;
                  }
                  
                  .module-card {
                      background: #f8f9fa;
                      border-radius: 12px;
                      padding: 20px;
                      transition: transform 0.3s, box-shadow 0.3s;
                      border-left: 4px solid #3498db;
                  }
                  
                  .module-card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                  }
                  
                  .module-card h3 {
                      color: #2c3e50;
                      margin-bottom: 10px;
                      font-size: 1.2rem;
                  }
                  
                  .module-card p {
                      color: #666;
                      font-size: 0.9rem;
                      margin-bottom: 15px;
                  }
                  
                  .module-card a {
                      display: inline-block;
                      background: #3498db;
                      color: white;
                      text-decoration: none;
                      padding: 8px 16px;
                      border-radius: 6px;
                      font-size: 0.9rem;
                      transition: background 0.3s;
                  }
                  
                  .module-card a:hover {
                      background: #2980b9;
                  }
                  
                  .footer {
                      background: #2c3e50;
                      color: white;
                      text-align: center;
                      padding: 20px;
                      font-size: 0.85rem;
                  }
                  
                  @media (max-width: 768px) {
                      .header h1 { font-size: 1.8rem; }
                      .content { padding: 20px; }
                      .modules { grid-template-columns: 1fr; }
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>📚 Documentació del Blog Django</h1>
                      <p>Projecte M485 - Bloc 6</p>
                  </div>
                  <div class="content">
                      <h2>📖 Mòduls del Projecte</h2>
                      <div class="modules">
                          <div class="module-card">
                              <h3>📄 blog.views</h3>
                              <p>Controladors principals i lògica de negoci del blog</p>
                              <a href="blog.views.html">Veure documentació →</a>
                          </div>
                          <div class="module-card">
                              <h3>📊 blog.models</h3>
                              <p>Models de dades: Author, Post i Tag</p>
                              <a href="blog.models.html">Veure documentació →</a>
                          </div>
                          <div class="module-card">
                              <h3>🔗 blog.urls</h3>
                              <p>Rutes i URLs de l'aplicació blog</p>
                              <a href="blog.urls.html">Veure documentació →</a>
                          </div>
                          <div class="module-card">
                              <h3>⚙️ blog.admin</h3>
                              <p>Configuració del panell d'administració</p>
                              <a href="blog.admin.html">Veure documentació →</a>
                          </div>
                          <div class="module-card">
                              <h3>📱 blog.apps</h3>
                              <p>Configuració principal de l'aplicació</p>
                              <a href="blog.apps.html">Veure documentació →</a>
                          </div>
                          <div class="module-card">
                              <h3>🌐 my_site.urls</h3>
                              <p>Rutes principals del projecte</p>
                              <a href="my_site.urls.html">Veure documentació →</a>
                          </div>
                          <div class="module-card">
                              <h3>🔧 my_site.settings</h3>
                              <p>Configuració i paràmetres del projecte</p>
                              <a href="my_site.settings.html">Veure documentació →</a>
                          </div>
                      </div>
                  </div>
                  <div class="footer">
                      <p>Documentació generada automàticament amb Pydoc | Blog Django M485</p>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Verify documentation files
        run: |
          echo "=== Archivos en docs/ ==="
          ls -la docs/
          echo ""
          echo "=== Verificando contenido HTML ==="
          for file in docs/*.html; do
            echo "✅ $file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
